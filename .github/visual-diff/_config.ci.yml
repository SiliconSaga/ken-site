# CI-only overlay for the Unit 2 visual-diff build. Layered over _config.yml
# via `--config _config.yml,.github/visual-diff/_config.ci.yml`, so the site's
# real `url: ""` (the baseurl-flip story) stays untouched in production.
#
# Two things the diff build needs that production deliberately omits:
#   - url:      jekyll-sitemap emits nothing without a url.
#   - plugins:  jekyll-sitemap is an OPTIONAL GitHub Pages plugin (bundled by
#               the github-pages gem but not auto-enabled); it must be listed.
url: "http://localhost:4000"
plugins:
  - jekyll-sitemap
