---
layout: default
---
<section class="block">
  <div class="container">
    <article class="article">
      {% if page.category %}<span class="news-card tag" style="display:inline-block">{{ page.category }}</span>{% endif %}
      <h1>{{ page.title }}</h1>
      <p class="meta">{{ page.date | date: "%B %-d, %Y" }}</p>
      {{ content }}
      <a class="back" href="{{ '/news/' | relative_url }}">&larr; Back to all news</a>
    </article>
  </div>
</section>
